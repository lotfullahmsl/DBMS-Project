<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Signup</title>
  <link rel="stylesheet" href="Login-&-Signup-styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>
  <!-- Navbar -->
  <nav class="cart-navbar">
    <div class="navbar-left">
      <a href="index.html" class="navbar-logo">SoleNest</a>
    </div>
    <a href="index.html" class="navbar-home">
      <i class="fas fa-home"></i>
    </a>
    <div class="navbar-right">
      <a href="#" class="navbar-login">Log In</a>
    </div>
    <button class="hamburger" aria-label="Toggle Menu">
      <i class="fas fa-bars"></i>
    </button>
    <div class="navbar-menu">
      <a href="#" class="navbar-home-mobile">
        <i class="fas fa-home"></i> Home
      </a>
      <a href="#" class="navbar-login-mobile">Log In</a>
    </div>
  </nav>

  <!-- Login & Signup Form -->
  <div class="container">
    <div class="form-box">
      <h2 id="form-title">Login</h2>
      <form id="form" onsubmit="return validateForm()">
        <div class="input-group">
          <input type="email" id="email" placeholder="Email" required>
          <small id="email-error" style="color:red;"></small>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required>
          <span class="toggle-password" onclick="togglePassword()">👁️</span>
        </div>
        <div id="extra-fields" style="display: none;">
          <div class="input-group">
            <input type="text" id="age" placeholder="Age">
          </div>
          <div class="input-group">
            <select id="gender">
              <option value="">Select Gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>
          <div class="input-group">
            <input type="date" id="dob">
          </div>
        </div>
        <button type="submit">Submit</button>
      </form>
      <p id="toggle-text">Don't have an account? <span onclick="toggleForm()">Sign up</span></p>
    </div>
  </div>

  <script src="Login-&-Signup-script.js"></script>
</body>

</html>
